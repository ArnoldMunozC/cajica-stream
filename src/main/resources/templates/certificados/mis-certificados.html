<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title>Mis Certificados - Cajica Stream</title>
</head>
<body>
<section>
    <!-- Hero -->
    <div class="hero-section rounded-3 mb-4" style="margin-left:-12px;margin-right:-12px;">
        <div class="container py-2">
            <h1 class="mb-1"><i class="bi bi-award me-2"></i>Mis Certificados</h1>
            <p class="mb-0 opacity-75">Descarga y comparte tus logros de formación</p>
        </div>
    </div>

    <!-- Sin certificados -->
    <div th:if="${#lists.isEmpty(certificados)}" class="text-center py-5">
        <i class="bi bi-award" style="font-size:4rem;color:#cbd5e0;"></i>
        <h4 class="mt-3 text-muted">Aún no tienes certificados</h4>
        <p class="text-muted small">Completa los cursos para obtener tu certificado.</p>
        <a th:href="@{/cursos}" class="btn btn-primary mt-2">
            <i class="bi bi-grid me-1"></i>Ver Cursos
        </a>
    </div>

    <!-- Grid de certificados -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"
         th:unless="${#lists.isEmpty(certificados)}">
        <div class="col" th:each="certificado : ${certificados}">
            <div class="card h-100 overflow-hidden">
                <!-- Header con gradiente -->
                <div class="p-3 text-white"
                     style="background:linear-gradient(135deg,#003366,#0b63a8);">
                    <div class="d-flex align-items-start gap-2">
                        <i class="bi bi-patch-check-fill fs-4 mt-1" style="color:#B89D66;"></i>
                        <div>
                            <h6 class="mb-0 fw-semibold lh-sm"
                                th:text="${certificado.curso.nombre}">Nombre del Curso</h6>
                            <small class="opacity-75">Certificado oficial</small>
                        </div>
                    </div>
                </div>

                <div class="card-body">
                    <div class="row g-2 small">
                        <div class="col-6">
                            <div class="p-2 bg-light rounded-2">
                                <div class="text-muted mb-1" style="font-size:0.72rem;">FECHA DE EMISIÓN</div>
                                <div class="fw-semibold"
                                     th:text="${#temporals.format(certificado.fechaEmision, 'dd/MM/yyyy')}"></div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-2 bg-light rounded-2">
                                <div class="text-muted mb-1" style="font-size:0.72rem;">VIGENTE HASTA</div>
                                <div class="fw-semibold"
                                     th:text="${#temporals.format(certificado.fechaVigencia, 'dd/MM/yyyy')}"></div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-2 bg-light rounded-2">
                                <div class="text-muted mb-1" style="font-size:0.72rem;">NOTA PROMEDIO</div>
                                <div class="fw-semibold"
                                     th:text="${#numbers.formatDecimal(certificado.notaPromedio, 1, 1) + '%'}">0%</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-2 bg-light rounded-2">
                                <div class="text-muted mb-1" style="font-size:0.72rem;">CÓDIGO</div>
                                <div class="fw-semibold text-truncate"
                                     th:text="${certificado.codigoVerificacion}"
                                     th:title="${certificado.codigoVerificacion}"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-footer bg-transparent d-grid gap-2 pb-3">
                    <a th:href="@{/certificados/curso/{id}/descargar(id=${certificado.curso.id})}"
                       class="btn btn-primary btn-sm fw-semibold">
                        <i class="bi bi-download me-1"></i>Descargar PDF
                    </a>
                    <a th:href="@{/certificados/verificar/{codigo}(codigo=${certificado.codigoVerificacion})}"
                       class="btn btn-outline-secondary btn-sm" target="_blank">
                        <i class="bi bi-qr-code me-1"></i>Verificar certificado
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
