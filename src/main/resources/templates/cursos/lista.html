<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title>Cursos - Cajica Stream</title>
</head>
<body>
    <section>
        <!-- Hero -->
        <div class="hero-section rounded-3 mb-4" style="margin-left:-12px;margin-right:-12px;">
            <div class="container py-2">
                <div class="row align-items-center">
                    <div class="col-lg-8">
                        <h1 class="mb-2"><i class="bi bi-mortarboard me-2"></i>Cursos disponibles</h1>
                        <p class="mb-0">Formación gratuita para la comunidad de Cajicá — Secretaría de Salud</p>
                    </div>
                    <div class="col-lg-4 text-lg-end mt-3 mt-lg-0" sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/cursos/nuevo}" class="btn btn-light fw-semibold me-2">
                            <i class="bi bi-plus-circle me-1"></i>Nuevo Curso
                        </a>
                        <a th:href="@{/cursos/admin/deshabilitados}" class="btn btn-outline-light">
                            <i class="bi bi-eye-slash me-1"></i>Deshabilitados
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Grid de cursos -->
        <div th:if="${!#lists.isEmpty(cursos)}">
            <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4">
                <div th:each="curso : ${cursos}" class="col">
                    <div class="card h-100 position-relative"
                         th:classappend="${!curso.activo} ? 'opacity-75' : ''">

                        <span th:if="${!curso.activo}"
                              class="position-absolute top-0 end-0 m-2 badge bg-danger">
                            Deshabilitado
                        </span>

                        <img th:if="${curso.imagenPath}"
                             th:src="@{'/api/cursos/images/' + ${curso.imagenPath}}"
                             class="card-img-top curso-imagen" alt="Imagen del curso">
                        <div th:unless="${curso.imagenPath}"
                             class="card-img-top curso-imagen d-flex align-items-center justify-content-center"
                             style="background:linear-gradient(135deg,#003366,#0b63a8);">
                            <i class="bi bi-book-half text-white" style="font-size:3.5rem;opacity:0.5;"></i>
                        </div>

                        <div class="card-body d-flex flex-column">
                            <div class="mb-2">
                                <span class="badge-categoria" th:text="${curso.categoria}">Categoría</span>
                            </div>
                            <h5 class="card-title fw-semibold mb-1" th:text="${curso.nombre}">Nombre</h5>
                            <p class="card-text text-muted small flex-grow-1"
                               th:text="${#strings.abbreviate(curso.descripcion, 110)}">Descripción</p>
                        </div>

                        <div class="card-footer bg-transparent d-flex justify-content-between align-items-center pt-0 pb-3 px-3">
                            <a th:href="@{/cursos/{id}(id=${curso.id})}" class="btn btn-primary btn-sm">
                                <i class="bi bi-eye me-1"></i>Ver curso
                            </a>
                            <div class="d-flex gap-2" sec:authorize="hasRole('ADMIN')">
                                <a th:if="${curso.activo}"
                                   th:href="@{/cursos/editar/{id}(id=${curso.id})}"
                                   class="btn btn-sm btn-outline-secondary" title="Editar">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:if="${curso.activo}"
                                   th:href="@{/cursos/eliminar/{id}(id=${curso.id})}"
                                   class="btn btn-sm btn-outline-danger" title="Deshabilitar"
                                   onclick="return confirm('¿Deshabilitar este curso?')">
                                    <i class="bi bi-slash-circle"></i>
                                </a>
                                <a th:unless="${curso.activo}"
                                   th:href="@{/cursos/habilitar/{id}(id=${curso.id})}"
                                   class="btn btn-sm btn-outline-success" title="Habilitar"
                                   onclick="return confirm('¿Habilitar este curso?')">
                                    <i class="bi bi-check-circle"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Estado vacío -->
        <div th:if="${#lists.isEmpty(cursos)}" class="text-center py-5">
            <i class="bi bi-journal-x" style="font-size:4rem;color:#cbd5e0;"></i>
            <h4 class="mt-3 text-muted">No hay cursos disponibles</h4>
            <p class="text-muted small">Aún no se han publicado cursos.</p>
            <a th:href="@{/cursos/nuevo}" class="btn btn-primary mt-2" sec:authorize="hasRole('ADMIN')">
                <i class="bi bi-plus-circle me-1"></i>Crear el primer curso
            </a>
        </div>
    </section>
</body>
</html>
