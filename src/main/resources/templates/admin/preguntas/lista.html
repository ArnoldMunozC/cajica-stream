<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title>Preguntas pendientes - Cajica Stream</title>
    <style>
        .admin-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #003366 100%);
            color: #fff;
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
        }
        .stat-pill {
            background: rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 0.3rem 1rem;
            font-size: 0.85rem;
        }
        .pregunta-item {
            border: none;
            border-radius: 10px;
            margin-bottom: 0.75rem;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
            transition: box-shadow 0.2s;
        }
        .pregunta-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .pregunta-contenido {
            background: #f8f9fc;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            color: #4a5568;
            margin-top: 0.5rem;
            border-left: 3px solid #B89D66;
        }
    </style>
</head>
<body>
<section>
    <!-- Header admin -->
    <div class="admin-header d-flex flex-wrap justify-content-between align-items-center gap-3">
        <div>
            <h1 class="h3 mb-1 fw-bold">
                <i class="bi bi-question-circle me-2"></i>Preguntas pendientes
            </h1>
            <p class="mb-0 opacity-75 small">Preguntas de estudiantes sin respuesta del instructor</p>
        </div>
        <div class="d-flex gap-2">
            <div class="stat-pill" th:classappend="${pendientesCount > 0} ? 'bg-warning bg-opacity-25 text-warning' : ''">
                <i class="bi bi-clock me-1"></i>
                <span th:text="${pendientesCount}">0</span> pendientes
            </div>
        </div>
    </div>

    <!-- Sin pendientes -->
    <div th:if="${#lists.isEmpty(pendientes)}" class="text-center py-5">
        <i class="bi bi-check-circle" style="font-size:4rem;color:#48bb78;opacity:0.6;"></i>
        <h4 class="mt-3 fw-semibold" style="color:#2f855a;">¡Todo al día!</h4>
        <p class="text-muted small">No hay preguntas pendientes de respuesta.</p>
    </div>

    <!-- Lista de preguntas -->
    <div th:unless="${#lists.isEmpty(pendientes)}">
        <div class="card pregunta-item" th:each="p : ${pendientes}">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start gap-3">
                    <div class="flex-grow-1">
                        <!-- Título y metadata -->
                        <h6 class="fw-bold mb-1" th:text="${p.titulo}">Título</h6>
                        <div class="d-flex flex-wrap gap-2 mb-2">
                            <span class="badge bg-primary bg-opacity-10 text-primary rounded-pill small">
                                <i class="bi bi-book me-1"></i>
                                <span th:text="${p.curso != null ? p.curso.nombre : 'Curso'}"></span>
                            </span>
                            <span class="badge bg-secondary bg-opacity-10 text-secondary rounded-pill small">
                                <i class="bi bi-play-circle me-1"></i>
                                <span th:text="${p.video != null ? p.video.titulo : 'Video'}"></span>
                            </span>
                            <span class="badge bg-dark bg-opacity-10 text-dark rounded-pill small">
                                <i class="bi bi-person me-1"></i>
                                <span th:text="${p.usuario != null ? (p.usuario.nombreCompleto != null ? p.usuario.nombreCompleto : p.usuario.username) : 'Usuario'}"></span>
                            </span>
                            <span th:if="${p.fechaCreacion != null}"
                                  class="text-muted small align-self-center">
                                <i class="bi bi-calendar3 me-1"></i>
                                <span th:text="${p.fechaCreacion}"></span>
                            </span>
                        </div>

                        <!-- Contenido -->
                        <div class="pregunta-contenido" th:text="${p.contenido}"></div>
                    </div>

                    <!-- Acciones -->
                    <div class="d-flex flex-column gap-2 flex-shrink-0">
                        <a class="btn btn-primary btn-sm"
                           th:if="${p.curso != null and p.video != null}"
                           th:href="@{/cursos/{cursoId}/videos/{videoId}/preguntas(cursoId=${p.curso.id},videoId=${p.video.id})}">
                            <i class="bi bi-chat-dots me-1"></i>Responder
                        </a>
                        <a class="btn btn-outline-secondary btn-sm"
                           th:if="${p.curso != null and p.video != null}"
                           th:href="@{/cursos/{cursoId}/videos/{videoId}/view(cursoId=${p.curso.id},videoId=${p.video.id})}">
                            <i class="bi bi-play me-1"></i>Ver video
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
