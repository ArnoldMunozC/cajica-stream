<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="${accion == 'crear' ? 'Nuevo Video' : 'Editar Video'} + ' - Cajica Stream'">Formulario de Video</title>
</head>
<body>
    <section>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 th:text="${accion == 'crear' ? 'Nuevo Video' : 'Editar Video'}">Formulario de Video</h1>
                <h5 class="text-muted" th:text="${curso.nombre}">Nombre del Curso</h5>
            </div>
            <div>
                <a th:href="@{/cursos/{id}/videos(id=${curso.id})}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Volver
                </a>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="${accion == 'crear' ? '/cursos/' + curso.id + '/videos/nuevo' : '/cursos/' + curso.id + '/videos/' + video.id + '/editar'}"
                      method="post" enctype="multipart/form-data" th:object="${video}">

                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título</label>
                        <input type="text" class="form-control" id="titulo" name="titulo"
                               th:value="${video.titulo}" required>
                    </div>

                    <div class="mb-3">
                        <label for="seccion" class="form-label">Sección</label>
                        <select class="form-select" id="seccion" name="seccion">
                            <option value="" th:selected="${video.seccion == null || #strings.isEmpty(video.seccion)}">Sin sección</option>
                            <option th:each="opt : ${seccionOptions}"
                                    th:value="${opt}"
                                    th:text="${opt}"
                                    th:selected="${video.seccion != null && video.seccion == opt}"></option>
                        </select>
                        <div class="form-text">
                            Opcional. Sirve para agrupar los videos en listas desplegables por módulo/tema.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="videoUrl" class="form-label">URL del Video (recomendado)</label>
                        <input type="text" class="form-control" id="videoUrl" name="videoUrl"
                               th:value="${video.videoUrl}" placeholder="https://www.youtube.com/watch?v=...">
                        <div class="form-text">Puedes usar URLs de YouTube. <strong>Recomendado para videos de mayor tamaño.</strong></div>
                        <div id="duracionStatus" class="mt-1 small"></div>
                    </div>


                    <input type="hidden" id="duracion" name="duracion" th:value="${video.duracion}">
                    <div class="mb-3">
                        <label class="form-label">Duración detectada</label>
                        <input type="text" class="form-control" id="duracionVisible" readonly
                               style="background-color:#f8f9fc; cursor:default;"
                               th:value="${video.duracion != null ? (#numbers.formatInteger(video.duracion / 3600, 2) + ':' + #numbers.formatInteger((video.duracion % 3600) / 60, 2) + ':' + #numbers.formatInteger(video.duracion % 60, 2)) : ''}"
                               placeholder="Se detecta automáticamente">
                    </div>

                    <!-- Player oculto para detectar duración de YouTube -->
                    <div id="ytPlayerContainer" style="display:none;position:absolute;left:-9999px;">
                        <div id="ytPlayerTemp"></div>
                    </div>

                    <script src="https://www.youtube.com/iframe_api"></script>
                    <script>
                        var ytTempPlayer = null;
                        var duracionDetectada = false;

                        function onYouTubeIframeAPIReady() {}

                        // Detectar automáticamente al pegar o al salir del campo
                        document.addEventListener('DOMContentLoaded', function() {
                            var urlInput = document.getElementById('videoUrl');
                            urlInput.addEventListener('blur', function() {
                                if (extraerYoutubeId(this.value)) detectarDuracionYoutube();
                            });
                            urlInput.addEventListener('paste', function() {
                                setTimeout(function() {
                                    if (extraerYoutubeId(urlInput.value)) detectarDuracionYoutube();
                                }, 100);
                            });
                        });

                        function extraerYoutubeId(url) {
                            if (!url) return null;
                            url = url.trim();
                            if (url.includes('youtu.be/')) {
                                var parte = url.split('youtu.be/')[1];
                                return parte ? parte.split('?')[0] : null;
                            }
                            if (url.includes('watch?v=')) {
                                var parte = url.split('v=')[1];
                                return parte ? parte.split('&')[0] : null;
                            }
                            return null;
                        }

                        function detectarDuracionYoutube() {
                            var url = document.getElementById('videoUrl').value;
                            var videoId = extraerYoutubeId(url);
                            var status = document.getElementById('duracionStatus');

                            if (!videoId) return;

                            status.innerHTML = '<span class="text-muted"><i class="bi bi-hourglass-split me-1"></i>Detectando duración...</span>';
                            duracionDetectada = false;

                            if (ytTempPlayer) { ytTempPlayer.destroy(); ytTempPlayer = null; }
                            document.getElementById('ytPlayerContainer').style.display = 'block';

                            ytTempPlayer = new YT.Player('ytPlayerTemp', {
                                height: '1', width: '1',
                                videoId: videoId,
                                playerVars: { autoplay: 0 },
                                events: {
                                    'onReady': function(event) {
                                        var dur = Math.round(event.target.getDuration());
                                        if (dur > 0 && !duracionDetectada) {
                                            duracionDetectada = true;
                                            document.getElementById('duracion').value = dur;
                                            var h = Math.floor(dur / 3600);
                                            var m = Math.floor((dur % 3600) / 60);
                                            var s = dur % 60;
                                            var fmt = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
                                            document.getElementById('duracionVisible').value = fmt;
                                            status.innerHTML = '<span class="text-success"><i class="bi bi-check-circle me-1"></i>Duración detectada: ' + fmt + '</span>';
                                        }
                                        document.getElementById('ytPlayerContainer').style.display = 'none';
                                    },
                                    'onError': function() {
                                        status.innerHTML = '';
                                        document.getElementById('ytPlayerContainer').style.display = 'none';
                                    }
                                }
                            });
                        }
                    </script>

                    <div class="mb-3">
                        <label for="orden" class="form-label">Orden</label>
                        <input type="number" class="form-control" id="orden" name="orden"
                               th:value="${video.orden}" min="1">
                        <div class="form-text">
                            Posición del video en la lista (opcional). Si no se especifica, se asignará automáticamente.
                        </div>
                    </div>


                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi" th:classappend="${accion == 'crear' ? 'bi-plus-circle' : 'bi-check-circle'}"></i>
                            <span th:text="${accion == 'crear' ? 'Crear Video' : 'Actualizar Video'}">Guardar</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
