<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="${video.titulo} + ' - Cajica Stream'">Reproducir Video</title>
    <style>
        /* Página de video usa ancho completo */
        .container { max-width: 100% !important; padding-left: 1.5rem !important; padding-right: 1.5rem !important; }

        .player-wrapper {
            background: #0d1117;
            border-radius: 12px 12px 0 0;
            overflow: hidden;
        }
        .player-wrapper video,
        .player-wrapper iframe,
        .player-wrapper .ratio {
            display: block;
            width: 100%;
        }
        .video-info-card { border-radius: 0 0 12px 12px; border-top: none; }

        /* Sidebar estilo Udemy */
        .sidebar-card { max-height: 680px; overflow: hidden; display: flex; flex-direction: column; border-radius: 10px; }
        .sidebar-scroll { overflow-y: auto; flex: 1; }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }

        .seccion-header {
            background: #1e293b;
            padding: 12px 16px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
            user-select: none;
        }
        .seccion-header:hover { background: #263548; }
        .seccion-titulo { font-weight: 700; font-size: 0.875rem; color: #f1f5f9; line-height: 1.3; }
        .seccion-meta { font-size: 0.7rem; color: #94a3b8; margin-top: 3px; }
        .seccion-chevron { transition: transform 0.2s; color: #94a3b8; }
        .seccion-chevron.collapsed { transform: rotate(-90deg); }

        .ci {
            display: flex !important;
            flex-direction: row !important;
            align-items: flex-start !important;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid #f0f2f5;
            text-decoration: none !important;
            color: #1a202c !important;
            background: #fff;
            transition: background 0.15s;
        }
        .ci:hover { background: #f7f8ff !important; }
        .ci.ci-active { background: #eef2ff !important; border-left: 3px solid #003366; padding-left: 13px; }
        .ci-check { flex-shrink: 0; margin-top: 2px; font-size: 1rem; line-height: 1; }
        .ci-check-done  { color: #6d28d9; }
        .ci-check-pending { color: #d1d5db; }
        .ci-body { flex: 1 !important; min-width: 0; display: block !important; }
        .ci-title { display: block !important; font-size: 0.83rem; font-weight: 500; line-height: 1.4; color: #1a202c; }
        .ci-active .ci-title { color: #003366; font-weight: 600; }
        .ci-meta { display: flex !important; align-items: center; gap: 5px; margin-top: 4px; font-size: 0.7rem; color: #9ca3af; }
        .ci-badge { font-size: 0.62rem; padding: 1px 7px; border-radius: 20px; font-weight: 600; }
        .ci-badge-pdf  { background: #fde8e8; color: #c81e1e; }
        .ci-badge-quiz { background: #fef3c7; color: #92400e; }

        /* Quiz */
        .quiz-opcion {
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }
        .quiz-opcion:has(input:checked) {
            border-color: #003366;
            background: #f0f4ff;
        }
        .quiz-opcion label { cursor: pointer; margin: 0; width: 100%; }
        .quiz-opcion input { display: none; }
    </style>
</head>
<body>
    <section>
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb small">
                <li class="breadcrumb-item">
                    <a th:href="@{/cursos}" class="text-decoration-none">Cursos</a>
                </li>
                <li class="breadcrumb-item">
                    <a th:href="@{/cursos/{id}(id=${curso.id})}"
                       th:text="${curso.nombre}" class="text-decoration-none"></a>
                </li>
                <li class="breadcrumb-item active" th:text="${video.titulo}"></li>
            </ol>
        </nav>

        <div class="row g-2">
            <!-- ── Columna principal ── -->
            <div class="col-lg-8">

                <!-- Reproductor / Quiz / PDF -->
                <div class="player-wrapper">
                    <!-- QUIZ -->
                    <div th:if="${quizSeleccionado != null}" class="p-4" style="background:#fff;">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div>
                                <h5 class="fw-bold mb-1" th:text="${quizSeleccionado.titulo}">Quiz</h5>
                                <span class="badge bg-warning text-dark">
                                    Aprobación 80% · Intentos máx: <span th:text="${quizSeleccionado.maxIntentos}"></span>
                                </span>
                            </div>
                            <div sec:authorize="hasRole('ADMIN')" class="d-flex gap-2">
                                <a class="btn btn-sm btn-outline-primary"
                                   th:href="@{/cursos/{cursoId}/quizzes/{quizId}/editar(cursoId=${curso.id},quizId=${quizSeleccionado.id})}">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a class="btn btn-sm btn-outline-secondary"
                                   th:href="@{/cursos/{cursoId}/quizzes/{quizId}/preguntas(cursoId=${curso.id},quizId=${quizSeleccionado.id})}">
                                    <i class="bi bi-list-check"></i>
                                </a>
                                <a class="btn btn-sm btn-outline-danger"
                                   th:href="@{/cursos/{cursoId}/quizzes/{quizId}/eliminar(cursoId=${curso.id},quizId=${quizSeleccionado.id})}"
                                   onclick="return confirm('¿Eliminar este quiz y todos sus intentos?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </div>

                        <!-- Resultado previo -->
                        <div th:if="${quizIntento != null}" class="alert mb-4"
                             th:classappend="${quizIntento.aprobado} ? 'alert-success' : 'alert-danger'">
                            <div class="d-flex align-items-center gap-3">
                                <i th:classappend="${quizIntento.aprobado} ? 'bi bi-check-circle-fill fs-3' : 'bi bi-x-circle-fill fs-3'"></i>
                                <div>
                                    <div class="fw-bold" th:text="${quizIntento.aprobado} ? 'Aprobado' : 'No aprobado'"></div>
                                    <div class="small">
                                        Puntaje: <strong th:text="${quizIntento.puntaje} + '/' + ${quizIntento.totalPreguntas}"></strong>
                                        · <strong th:text="${quizIntento.totalPreguntas == 0 ? 0 : T(java.lang.Math).round((quizIntento.puntaje * 100.0) / quizIntento.totalPreguntas)} + '%'"></strong>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <form th:action="@{/cursos/{cursoId}/videos/{id}/quiz/{quizId}/submit(cursoId=${curso.id},id=${video.id},quizId=${quizSeleccionado.id})}" method="post">
                            <div class="mb-4" th:each="p, pStat : ${quizSeleccionado.preguntas}">
                                <p class="fw-semibold mb-2">
                                    <span th:text="${pStat.count} + '. ' + ${p.enunciado}"></span>
                                </p>
                                <div th:if="${quizIntento != null}" class="mb-2">
                                    <span class="badge rounded-pill"
                                          th:classappend="${quizPreguntaCorrecta[p.id]} ? 'bg-success' : 'bg-danger'"
                                          th:text="${quizPreguntaCorrecta[p.id]} ? 'Correcta ✓' : 'Incorrecta ✗'"></span>
                                </div>
                                <div th:if="${p.tipo.name() == 'UNICA'}">
                                    <div class="quiz-opcion" th:each="o : ${p.opciones}">
                                        <label>
                                            <input type="radio"
                                                   th:id="'q_' + ${p.id} + '_' + ${o.id}"
                                                   th:name="'q_' + ${p.id}"
                                                   th:value="${o.id}">
                                            <span th:text="${o.texto}"></span>
                                        </label>
                                    </div>
                                </div>
                                <div th:if="${p.tipo.name() == 'MULTIPLE'}">
                                    <div class="quiz-opcion" th:each="o : ${p.opciones}">
                                        <label>
                                            <input type="checkbox"
                                                   th:id="'q_' + ${p.id} + '_' + ${o.id}"
                                                   th:name="'q_' + ${p.id}"
                                                   th:value="${o.id}">
                                            <span th:text="${o.texto}"></span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary fw-semibold px-4">
                                <i class="bi bi-send me-2"></i>Enviar respuestas
                            </button>
                        </form>
                    </div>

                    <!-- PDF -->
                    <div th:if="${quizSeleccionado == null and pdfSeleccionado != null}">
                        <div class="p-3 d-flex justify-content-between align-items-center"
                             style="background:#fff;border-bottom:1px solid #f0f0f0;">
                            <div>
                                <h6 class="fw-bold mb-0" th:text="${pdfSeleccionado.titulo}"></h6>
                                <small class="text-muted" th:if="${pdfSeleccionado.seccion}"
                                       th:text="'Sección: ' + ${pdfSeleccionado.seccion}"></small>
                            </div>
                            <div sec:authorize="hasRole('ADMIN')" class="d-flex gap-2">
                                <a class="btn btn-sm btn-outline-primary"
                                   th:href="@{/cursos/{cursoId}/pdfs/{pdfId}/editar(cursoId=${curso.id},pdfId=${pdfSeleccionado.id})}">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a class="btn btn-sm btn-outline-danger"
                                   th:href="@{/cursos/{cursoId}/pdfs/{pdfId}/eliminar(cursoId=${curso.id},pdfId=${pdfSeleccionado.id})}"
                                   onclick="return confirm('¿Eliminar este PDF?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </div>
                        <div class="ratio ratio-16x9">
                            <iframe th:src="@{'/api/cursos/pdfs/' + ${pdfSeleccionado.pdfFilePath}}"
                                    style="width:100%;height:100%;border:0;" title="PDF"></iframe>
                        </div>
                    </div>

                    <!-- VIDEO -->
                    <div th:if="${quizSeleccionado == null and pdfSeleccionado == null}">
                        <!-- YouTube -->
                        <!-- YouTube -->
                        <div th:if="${video.videoUrl != null and !video.videoUrl.isEmpty() and (video.videoUrl.contains('youtube.com') or video.videoUrl.contains('youtu.be'))}"
                             class="ratio ratio-16x9">
                            <iframe th:src="${'https://www.youtube.com/embed/' +
                                (video.videoUrl.contains('youtu.be') ?
                                    #strings.substringBefore(video.videoUrl.substring(video.videoUrl.lastIndexOf('/') + 1), '?') :
                                    (video.videoUrl.contains('watch?v=') ?
                                        #strings.substringBefore(video.videoUrl.substring(video.videoUrl.indexOf('v=') + 2), '&') :
                                        '')) +
                                '?rel=0&modestbranding=1&enablejsapi=1'}"
                                    th:data-curso-id="${curso.id}"
                                    th:data-video-id="${video.id}"
                                    id="youtubePlayer"
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                    referrerpolicy="strict-origin-when-cross-origin"
                                    allowfullscreen
                                    style="border:0;">
                            </iframe>
                        </div>
                        <!-- Vimeo -->
                        <div th:if="${video.videoUrl != null and !video.videoUrl.isEmpty() and video.videoUrl.contains('vimeo.com')}"
                             class="ratio ratio-16x9">
                            <iframe th:src="${'https://player.vimeo.com/video/' + video.videoUrl.replaceAll('.*vimeo.com/', '')}"
                                    frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
                        </div>
                        <!-- URL directa -->
                        <div th:if="${video.videoUrl != null and !video.videoUrl.isEmpty() and !video.videoUrl.contains('youtube.com') and !video.videoUrl.contains('youtu.be') and !video.videoUrl.contains('vimeo.com')}"
                             class="ratio ratio-16x9">
                            <video id="videoPlayer"
                                   th:attr="data-curso-id=${curso.id},data-video-id=${video.id}"
                                   controls preload="metadata">
                                <source th:src="${video.videoUrl}" type="video/mp4">
                            </video>
                        </div>
                        <!-- Local -->
                        <div th:if="${(video.videoUrl == null or video.videoUrl.isEmpty()) and video.videoFilePath != null}"
                             class="ratio ratio-16x9">
                            <video id="videoPlayer"
                                   th:attr="data-curso-id=${curso.id},data-video-id=${video.id}"
                                   controls controlsList="nodownload" preload="metadata"
                                   oncontextmenu="return false;">
                                <source th:src="@{'/api/cursos/videos/' + ${video.videoFilePath}}" type="video/mp4">
                            </video>
                        </div>
                    </div>
                </div>

                <!-- Info del video — solo cuando se está viendo el video -->
                <div th:if="${quizSeleccionado == null and pdfSeleccionado == null}"
                     class="card video-info-card mt-0">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                            <div>
                                <h4 class="fw-bold mb-1" th:text="${video.titulo}"></h4>
                                <span th:if="${video.duracion}" class="text-muted small">
                                    <i class="bi bi-clock me-1"></i>
                                    <span th:text="${video.duracion / 60 + ' min ' + video.duracion % 60 + ' seg'}"></span>
                                </span>
                            </div>
                            <div class="d-flex gap-2 flex-wrap">
                                <a th:if="${quizSeleccionado == null and pdfSeleccionado == null}"
                                   class="btn btn-outline-secondary btn-sm"
                                   th:href="@{/cursos/{cursoId}/videos/{id}/preguntas(cursoId=${curso.id},id=${video.id})}">
                                    <i class="bi bi-chat-dots me-1"></i>Preguntas
                                </a>
                                <div sec:authorize="hasRole('ADMIN')" class="d-flex gap-2">
                                    <a th:href="@{/cursos/{cursoId}/videos/{id}/editar(cursoId=${curso.id},id=${video.id})}"
                                       class="btn btn-outline-primary btn-sm">
                                        <i class="bi bi-pencil me-1"></i>Editar
                                    </a>
                                    <a th:href="@{/cursos/{cursoId}/videos/{id}/eliminar(cursoId=${curso.id},id=${video.id})}"
                                       class="btn btn-outline-danger btn-sm"
                                       onclick="return confirm('¿Eliminar este video?')">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                        <hr class="my-3">
                        <p class="text-muted mb-0" th:text="${video.descripcion}"></p>
                    </div>
                </div>
            </div>

            <!-- ── Sidebar: contenido del curso ── -->
            <div class="col-lg-4">
                <div class="card sidebar-card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span class="fw-bold small">
                            <i class="bi bi-collection-play me-1"></i>Contenido del curso
                        </span>
                        <a th:href="@{/cursos/{id}(id=${curso.id})}"
                           class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-arrow-left me-1"></i>Volver
                        </a>
                    </div>
                    <div class="sidebar-scroll">
                        <div th:each="entry, secStat : ${contenidoPorSeccion}">

                            <!-- Encabezado de sección -->
                            <div style="background:#1e293b;padding:12px 16px;border-bottom:1px solid #334155;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;"
                                 th:attr="data-bs-toggle='collapse', data-bs-target='#sec-' + ${secStat.index}">
                                <div>
                                    <div style="font-weight:700;font-size:0.875rem;color:#f1f5f9;line-height:1.3;" th:text="${entry.key}"></div>
                                    <div style="font-size:0.7rem;color:#94a3b8;margin-top:3px;" th:text="${#lists.size(entry.value)} + ' contenidos'"></div>
                                </div>
                                <i class="bi bi-chevron-up" style="color:#94a3b8;transition:transform 0.2s;margin-top:2px;"
                                   th:classappend="${entry.key != seccionActual and !secStat.first} ? ' collapsed' : ''"></i>
                            </div>

                            <!-- Items de la sección -->
                            <div class="collapse"
                                 th:id="'sec-' + ${secStat.index}"
                                 th:classappend="${entry.key == seccionActual or secStat.first} ? ' show' : ''">

                                <div th:each="item, itemStat : ${entry.value}">

                                    <!-- VIDEO -->
                                    <!-- VIDEO -->
                                    <a th:if="${item.tipo == 'VIDEO'}"
                                       th:href="@{/cursos/{cursoId}/videos/{id}(cursoId=${curso.id},id=${item.video.id})}"
                                       th:style="${item.video.id == video.id} ? 'display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid #f0f2f5;text-decoration:none;background:#eef2ff;border-left:3px solid #003366;padding-left:13px;' : 'display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid #f0f2f5;text-decoration:none;background:#fff;'">
                                        <div style="flex-shrink:0;margin-top:2px;font-size:1rem;line-height:1;"
                                             th:style="${videosCompletadosIds != null and videosCompletadosIds.contains(item.video.id)} ? 'color:#6d28d9;flex-shrink:0;margin-top:2px;font-size:1rem;' : 'color:#d1d5db;flex-shrink:0;margin-top:2px;font-size:1rem;'">
                                            <i th:class="${videosCompletadosIds != null and videosCompletadosIds.contains(item.video.id)} ? 'bi bi-check-square-fill' : 'bi bi-square'"></i>
                                        </div>
                                        <div style="flex:1;min-width:0;">
                                            <div style="font-size:0.83rem;font-weight:500;line-height:1.4;color:#1a202c;"
                                                 th:text="${itemStat.count} + '. ' + ${item.video.titulo}"></div>
                                            <div style="display:flex;align-items:center;gap:5px;margin-top:4px;font-size:0.7rem;color:#9ca3af;">
                                                <i class="bi bi-play-circle-fill" style="color:#6d28d9;font-size:0.7rem;"></i>
                                                <span th:if="${item.video.duracion}" th:text="${item.video.duracion / 60} + ' min'"></span>
                                            </div>
                                        </div>
                                    </a>

                                    <!-- PDF -->
                                    <a th:if="${item.tipo == 'PDF'}"
                                       th:href="@{/cursos/{cursoId}/videos/{id}/secure(cursoId=${curso.id},id=${video.id},pdfId=${item.pdf.id})}"
                                       th:style="${pdfSeleccionado != null and item.pdf.id == pdfSeleccionado.id} ? 'display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid #f0f2f5;text-decoration:none;background:#eef2ff;border-left:3px solid #003366;padding-left:13px;' : 'display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid #f0f2f5;text-decoration:none;background:#fff;'">
                                        <div style="flex-shrink:0;margin-top:2px;font-size:1rem;"
                                             th:style="${pdfsCompletadosIds != null and pdfsCompletadosIds.contains(item.pdf.id)} ? 'color:#6d28d9;flex-shrink:0;margin-top:2px;font-size:1rem;' : 'color:#d1d5db;flex-shrink:0;margin-top:2px;font-size:1rem;'">
                                            <i th:class="${pdfsCompletadosIds != null and pdfsCompletadosIds.contains(item.pdf.id)} ? 'bi bi-check-square-fill' : 'bi bi-square'"></i>
                                        </div>
                                        <div style="flex:1;min-width:0;">
                                            <div style="font-size:0.83rem;font-weight:500;line-height:1.4;color:#1a202c;"
                                                 th:text="${itemStat.count} + '. ' + ${item.pdf.titulo}"></div>
                                            <div style="display:flex;align-items:center;gap:5px;margin-top:4px;">
                                                <span style="font-size:0.62rem;padding:1px 7px;border-radius:20px;font-weight:600;background:#fde8e8;color:#c81e1e;">PDF</span>
                                            </div>
                                        </div>
                                    </a>

                                    <!-- QUIZ -->
                                    <a th:if="${item.tipo == 'QUIZ'}"
                                       th:href="@{/cursos/{cursoId}/videos/{id}/secure(cursoId=${curso.id},id=${video.id},quizId=${item.quiz.id})}"
                                       th:style="${quizSeleccionado != null and item.quiz.id == quizSeleccionado.id} ? 'display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid #f0f2f5;text-decoration:none;background:#eef2ff;border-left:3px solid #003366;padding-left:13px;' : 'display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid #f0f2f5;text-decoration:none;background:#fff;'">
                                        <!-- Aprobado -->
                                        <div th:if="${quizzesAprobadosIds != null and quizzesAprobadosIds.contains(item.quiz.id)}"
                                             style="flex-shrink:0;margin-top:2px;font-size:1rem;color:#16a34a;">
                                            <i class="bi bi-check-square-fill"></i>
                                        </div>
                                        <!-- Enviado pero no aprobado -->
                                        <div th:if="${quizzesCompletadosIds != null and quizzesCompletadosIds.contains(item.quiz.id) and (quizzesAprobadosIds == null or !quizzesAprobadosIds.contains(item.quiz.id))}"
                                             th:style="${quizFechaDisponibleMap != null and quizFechaDisponibleMap.containsKey(item.quiz.id)} ? 'flex-shrink:0;margin-top:2px;font-size:1rem;color:#d97706;' : 'flex-shrink:0;margin-top:2px;font-size:1rem;color:#dc2626;'">
                                            <i th:class="${quizFechaDisponibleMap != null and quizFechaDisponibleMap.containsKey(item.quiz.id)} ? 'bi bi-clock-fill' : 'bi bi-x-square-fill'"></i>
                                        </div>
                                        <!-- No intentado -->
                                        <div th:if="${quizzesCompletadosIds == null or !quizzesCompletadosIds.contains(item.quiz.id)}"
                                             style="flex-shrink:0;margin-top:2px;font-size:1rem;color:#d1d5db;">
                                            <i class="bi bi-square"></i>
                                        </div>
                                        <div style="flex:1;min-width:0;">
                                            <div style="font-size:0.83rem;font-weight:500;line-height:1.4;color:#1a202c;"
                                                 th:text="${itemStat.count} + '. ' + ${item.quiz.titulo}"></div>
                                            <div style="display:flex;align-items:center;gap:5px;margin-top:4px;">
                                                <span th:if="${quizzesAprobadosIds != null and quizzesAprobadosIds.contains(item.quiz.id)}"
                                                      style="font-size:0.62rem;padding:1px 7px;border-radius:20px;font-weight:600;background:#dcfce7;color:#15803d;">Aprobado</span>
                                                <!-- No aprobado con reintento disponible próximamente -->
                                                <span th:if="${quizzesCompletadosIds != null and quizzesCompletadosIds.contains(item.quiz.id) and (quizzesAprobadosIds == null or !quizzesAprobadosIds.contains(item.quiz.id)) and quizFechaDisponibleMap != null and quizFechaDisponibleMap.containsKey(item.quiz.id)}"
                                                      style="font-size:0.62rem;padding:1px 7px;border-radius:20px;font-weight:600;background:#fef3c7;color:#92400e;"
                                                      th:text="'Desde ' + ${quizFechaDisponibleMap.get(item.quiz.id)}"></span>
                                                <!-- No aprobado sin reintento -->
                                                <span th:if="${quizzesCompletadosIds != null and quizzesCompletadosIds.contains(item.quiz.id) and (quizzesAprobadosIds == null or !quizzesAprobadosIds.contains(item.quiz.id)) and (quizFechaDisponibleMap == null or !quizFechaDisponibleMap.containsKey(item.quiz.id))}"
                                                      style="font-size:0.62rem;padding:1px 7px;border-radius:20px;font-weight:600;background:#fee2e2;color:#dc2626;">No aprobado</span>
                                                <span th:if="${quizzesCompletadosIds == null or !quizzesCompletadosIds.contains(item.quiz.id)}"
                                                      style="font-size:0.62rem;padding:1px 7px;border-radius:20px;font-weight:600;background:#fef3c7;color:#92400e;">Quiz</span>
                                                <span style="font-size:0.7rem;color:#9ca3af;" th:text="${item.quiz.maxIntentos} + ' intento(s)'"></span>
                                            </div>
                                        </div>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script th:inline="javascript">
        var ytPlayer = null;
        var ytCompletadoEnviado = false;

        function onYouTubeIframeAPIReady() {
            const iframe = document.getElementById('youtubePlayer');
            if (!iframe) return;

            // Envuelve el iframe existente — no lo reemplaza
            ytPlayer = new YT.Player(iframe, {
                events: {
                    'onReady': function() {
                        // Verificar progreso cada 5 segundos
                        setInterval(function() {
                            if (!ytPlayer || ytCompletadoEnviado) return;
                            try {
                                const duracion = ytPlayer.getDuration();
                                const actual = ytPlayer.getCurrentTime();
                                if (duracion > 0 && actual / duracion >= 0.95) {
                                    ytCompletadoEnviado = true;
                                    marcarYTCompletado();
                                }
                            } catch(e) {}
                        }, 5000);
                    },
                    'onStateChange': function(event) {
                        // YT.PlayerState.ENDED = 0
                        if (event.data === 0 && !ytCompletadoEnviado) {
                            ytCompletadoEnviado = true;
                            marcarYTCompletado();
                        }
                    }
                }
            });
        }

        async function marcarYTCompletado() {
            const iframe = document.getElementById('youtubePlayer');
            if (!iframe) return;
            const cursoId = iframe.dataset.cursoId;
            const videoId = iframe.dataset.videoId;
            if (!cursoId || !videoId) return;
            try {
                await fetch(`/cursos/${cursoId}/videos/${videoId}/completado`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    credentials: 'same-origin'
                });
            } catch(e) { console.warn('marcarYTCompletado error', e); }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const videoPlayers = document.querySelectorAll('video');
            if (videoPlayers.length > 1) {
                for (let i = 1; i < videoPlayers.length; i++) {
                    videoPlayers[i].parentNode.removeChild(videoPlayers[i]);
                }
            }

            const videoPlayer = document.getElementById('videoPlayer');
            if (videoPlayer) {
                const cursoIdFromTpl = /*[[${curso.id}]]*/ 0;
                const videoIdFromTpl = /*[[${video.id}]]*/ 0;
                const cursoId = Number(videoPlayer.dataset.cursoId) || cursoIdFromTpl;
                const videoId = Number(videoPlayer.dataset.videoId) || videoIdFromTpl;
                const progresoSegundos = /*[[${progresoSegundos}]]*/ 0;
                const sessionKey = `videoTime:${cursoId}:${videoId}`;

                if ('controlsList' in videoPlayer) videoPlayer.controlsList.add('nodownload');
                videoPlayer.addEventListener('contextmenu', e => { e.preventDefault(); return false; });

                let maxAllowed = 0, initialized = false, isSeeking = false, timeBeforeSeek = 0;
                const EPS = 0.75;

                function guardarTiempoAntesDeSalir() {
                    try {
                        if (!cursoId || !videoId) return;
                        const t = videoPlayer.currentTime;
                        if (t == null || !Number.isFinite(t) || t < 0) return;
                        sessionStorage.setItem(sessionKey, String(t));
                        fetch(`/cursos/${cursoId}/videos/${videoId}/progreso?segundo=${encodeURIComponent(t)}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            credentials: 'same-origin', keepalive: true
                        }).catch(e => console.warn('guardarProgreso error', e));
                    } catch(e) {}
                }

                document.querySelectorAll('form[data-save-video-time="true"]').forEach(f => {
                    f.addEventListener('submit', guardarTiempoAntesDeSalir);
                });

                const sessionTimeRaw = sessionStorage.getItem(sessionKey);
                const sessionTime = sessionTimeRaw != null ? Number(sessionTimeRaw) : null;

                if (progresoSegundos && progresoSegundos > 0) {
                    videoPlayer.addEventListener('loadedmetadata', function() {
                        try {
                            const preferred = (sessionTime != null && Number.isFinite(sessionTime) && sessionTime > 0) ? sessionTime : progresoSegundos;
                            if (Number.isFinite(preferred) && preferred < videoPlayer.duration) {
                                videoPlayer.currentTime = preferred;
                                maxAllowed = preferred;
                                initialized = true;
                                if (preferred === sessionTime) sessionStorage.removeItem(sessionKey);
                            }
                        } catch(e) {}
                    }, { once: true });
                } else if (sessionTime != null && Number.isFinite(sessionTime) && sessionTime > 0) {
                    videoPlayer.addEventListener('loadedmetadata', function() {
                        try {
                            if (sessionTime < videoPlayer.duration) {
                                videoPlayer.currentTime = sessionTime;
                                maxAllowed = sessionTime;
                                initialized = true;
                            }
                        } catch(e) {} finally { sessionStorage.removeItem(sessionKey); }
                    }, { once: true });
                }

                videoPlayer.addEventListener('loadedmetadata', function() {
                    if (initialized) return;
                    maxAllowed = videoPlayer.currentTime || 0;
                    initialized = true;
                }, { once: true });

                videoPlayer.addEventListener('timeupdate', function() {
                    if (!initialized) { maxAllowed = videoPlayer.currentTime || 0; initialized = true; }
                    if (isSeeking) return;
                    if (videoPlayer.currentTime > maxAllowed + EPS) { videoPlayer.currentTime = maxAllowed; return; }
                    if (videoPlayer.currentTime > maxAllowed) maxAllowed = videoPlayer.currentTime;
                    try {
                        if (!completadoEnviado && Number.isFinite(videoPlayer.duration) && videoPlayer.duration > 0) {
                            if (videoPlayer.currentTime / videoPlayer.duration >= 0.95) marcarCompletado();
                        }
                    } catch(e) {}
                });

                videoPlayer.addEventListener('seeking', function() {
                    if (!initialized) return;
                    isSeeking = true;
                    timeBeforeSeek = maxAllowed;
                    if (videoPlayer.currentTime > maxAllowed + EPS) {
                        const target = maxAllowed;
                        videoPlayer.currentTime = target;
                        setTimeout(() => { if (videoPlayer.currentTime > target + EPS) videoPlayer.currentTime = target; }, 0);
                    }
                });

                videoPlayer.addEventListener('seeked', function() {
                    if (!initialized) return;
                    isSeeking = false;
                    if (videoPlayer.currentTime > maxAllowed + EPS) {
                        const target = timeBeforeSeek;
                        videoPlayer.currentTime = target;
                        setTimeout(() => { if (videoPlayer.currentTime > target + EPS) videoPlayer.currentTime = target; }, 0);
                    }
                });

                let lastSent = 0, lastSentAt = 0, completadoEnviado = false;

                async function marcarCompletado() {
                    if (completadoEnviado || !cursoId || !videoId) return;
                    completadoEnviado = true;
                    try {
                        const r = await fetch(`/cursos/${cursoId}/videos/${videoId}/completado`, {
                            method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, credentials: 'same-origin'
                        });
                        if (!r.ok) console.warn('marcarCompletado failed', r.status);
                    } catch(e) { console.warn('marcarCompletado error', e); }
                }

                async function enviarProgreso(segundo) {
                    if (!cursoId || !videoId || segundo == null || !Number.isFinite(segundo) || segundo < 0) return;
                    const now = Date.now();
                    if (now - lastSentAt < 4000 && Math.abs(segundo - lastSent) < 2) return;
                    lastSentAt = now; lastSent = segundo;
                    try {
                        const r = await fetch(`/cursos/${cursoId}/videos/${videoId}/progreso?segundo=${encodeURIComponent(segundo)}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, credentials: 'same-origin'
                        });
                        if (!r.ok) console.warn('enviarProgreso failed', r.status);
                    } catch(e) { console.warn('enviarProgreso error', e); }
                }

                videoPlayer.addEventListener('pause', () => enviarProgreso(videoPlayer.currentTime));
                videoPlayer.addEventListener('ended', () => { enviarProgreso(videoPlayer.currentTime); marcarCompletado(); });
                setInterval(() => { if (!videoPlayer.paused && !videoPlayer.ended) enviarProgreso(videoPlayer.currentTime); }, 5000);
            }
        });
    </script>
    </section>
