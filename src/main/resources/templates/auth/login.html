<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title>Iniciar Sesión - Cajica Stream</title>
</head>
<body>
    <section>
        <div class="row justify-content-center mt-4">
            <div class="col-md-9 col-lg-7 col-xl-6">
                <div class="card overflow-hidden" style="border-radius:16px;">
                    <!-- Banner superior -->
                    <div class="p-4 text-white text-center"
                         style="background:linear-gradient(135deg,#003366,#0b63a8);">
                        <img th:src="@{/images/Captura.png}" alt="Logo" height="54" class="mb-3">
                        <h4 class="fw-bold mb-0">Bienvenido</h4>
                        <p class="small opacity-75 mb-0">Plataforma de formación — Secretaría de Salud</p>
                    </div>

                    <div class="card-body p-4">
                        <div th:if="${param.error}" class="alert alert-danger">
                            <i class="bi bi-exclamation-circle me-2"></i>Usuario o contraseña incorrectos.
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success">
                            <i class="bi bi-check-circle me-2"></i>Has cerrado sesión correctamente.
                        </div>
                        <div th:if="${mensaje}" class="alert alert-success">
                            <i class="bi bi-check-circle me-2"></i><span th:text="${mensaje}"></span>
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="form-floating mb-3">
                                <input class="form-control" id="username" name="username" type="text"
                                       placeholder="nombre_usuario" required autofocus/>
                                <label for="username"><i class="bi bi-person me-1"></i>Nombre de Usuario</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input class="form-control" id="password" name="password" type="password"
                                       placeholder="Contraseña" required/>
                                <label for="password"><i class="bi bi-lock me-1"></i>Contraseña</label>
                            </div>
                            <div class="d-flex align-items-center justify-content-between mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" id="remember-me" name="remember-me" type="checkbox"/>
                                    <label class="form-check-label small" for="remember-me">Recordar sesión</label>
                                </div>
                                <a th:href="@{/password/forgot}" class="small text-decoration-none">
                                    ¿Olvidaste tu contraseña?
                                </a>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                            </button>
                        </form>
                    </div>

                    <div class="card-footer text-center py-3 bg-light border-top-0">
                        <span class="small text-muted">¿No tienes cuenta? </span>
                        <a th:href="@{/registro}" class="small fw-semibold text-decoration-none">Regístrate gratis</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
