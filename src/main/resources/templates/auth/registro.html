<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title>Registro - Cajica Stream</title>
</head>
<body>
    <section>
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-9 col-xl-8">
                <div class="card overflow-hidden" style="border-radius:16px;">
                    <!-- Banner -->
                    <div class="p-4 text-white"
                         style="background:linear-gradient(135deg,#003366,#0b63a8);">
                        <h4 class="fw-bold mb-0"><i class="bi bi-person-plus me-2"></i>Crear cuenta</h4>
                        <p class="small opacity-75 mb-0">Regístrate gratis y accede a todos los cursos</p>
                    </div>

                    <div class="card-body p-4">
                        <form th:action="@{/registro}" th:object="${usuario}" method="post">

                            <!-- Datos personales -->
                            <h6 class="section-title mb-3">Datos personales</h6>
                            <div class="row g-3 mb-3">
                                <div class="col-12">
                                    <div class="form-floating">
                                        <input class="form-control" id="nombreCompleto"
                                               th:field="*{nombreCompleto}" type="text"
                                               placeholder="Nombres y Apellidos" required
                                               style="text-transform:lowercase;" />
                                        <label for="nombreCompleto">Nombres y Apellidos</label>
                                    </div>
                                    <div class="text-danger small mt-1"
                                         th:if="${#fields.hasErrors('nombreCompleto')}"
                                         th:errors="*{nombreCompleto}"></div>
                                </div>

                                <div class="col-md-5">
                                    <div class="form-floating">
                                        <select class="form-select" id="tipoDocumento"
                                                th:field="*{tipoDocumento}" required>
                                            <option value="">Seleccione...</option>
                                            <option value="TI">Tarjeta de Identidad (TI)</option>
                                            <option value="CC">Cédula de Ciudadanía (CC)</option>
                                            <option value="CE">Cédula de Extranjería (CE)</option>
                                        </select>
                                        <label for="tipoDocumento">Tipo de Documento</label>
                                    </div>
                                </div>
                                <div class="col-md-7">
                                    <div class="form-floating">
                                        <input class="form-control" id="numeroIdentificacion"
                                               th:field="*{numeroIdentificacion}" type="text"
                                               placeholder="Número de Identificación"
                                               pattern="[0-9]+" inputmode="numeric" required />
                                        <label for="numeroIdentificacion">Número de Identificación</label>
                                    </div>
                                    <div class="form-text small text-muted">Solo números, sin puntos ni comas.</div>
                                    <div class="text-danger small mt-1"
                                         th:if="${#fields.hasErrors('numeroIdentificacion')}"
                                         th:errors="*{numeroIdentificacion}"></div>
                                </div>

                                <div class="col-md-4">
                                    <div class="form-floating">
                                        <input class="form-control" id="edad" th:field="*{edad}"
                                               type="number" min="1" max="120" placeholder="Edad" required />
                                        <label for="edad">Edad</label>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-floating">
                                        <input class="form-control" id="telefono" th:field="*{telefono}"
                                               type="tel" placeholder="Teléfono" />
                                        <label for="telefono">Teléfono</label>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-floating">
                                        <select class="form-select" id="zonaResidencia"
                                                th:field="*{zonaResidencia}" required>
                                            <option value="">Seleccione...</option>
                                            <option value="Urbana">Urbana</option>
                                            <option value="Rural">Rural</option>
                                        </select>
                                        <label for="zonaResidencia">Zona</label>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <div class="form-floating">
                                        <input class="form-control" id="direccion" th:field="*{direccion}"
                                               type="text" placeholder="Dirección" />
                                        <label for="direccion">Dirección</label>
                                    </div>
                                </div>
                            </div>

                            <!-- Clasificación -->
                            <h6 class="section-title mb-3">Clasificación</h6>
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <select class="form-select" id="enfoqueGenero"
                                                th:field="*{enfoqueGenero}" required>
                                            <option value="">Seleccione...</option>
                                            <option value="Masculino">Masculino</option>
                                            <option value="Femenino">Femenino</option>
                                            <option value="LGBTIQ">LGBTIQ</option>
                                        </select>
                                        <label for="enfoqueGenero">Género</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <select class="form-select" id="clasificacionPoblacional"
                                                th:field="*{clasificacionPoblacional}">
                                            <option value="">Ninguna</option>
                                            <option value="Mujer cabeza de familia">Mujer cabeza de familia</option>
                                            <option value="Discapacidad">Discapacidad</option>
                                            <option value="Víctima conflicto armado">Víctima conflicto armado</option>
                                            <option value="Población Migrante">Población Migrante</option>
                                            <option value="Indígena">Indígena</option>
                                            <option value="Raizal/Palenque/Negro/Afro">Raizal / Palenque / Negro / Afro</option>
                                            <option value="Rom/Gitano">Rom / Gitano</option>
                                        </select>
                                        <label for="clasificacionPoblacional">Clasificación Poblacional</label>
                                    </div>
                                </div>
                            </div>

                            <!-- Datos de cuenta -->
                            <h6 class="section-title mb-3">Datos de acceso</h6>
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <input class="form-control" id="username" th:field="*{username}"
                                               type="text" placeholder="Nombre de Usuario" required />
                                        <label for="username">Nombre de Usuario</label>
                                    </div>
                                    <div class="text-danger small mt-1"
                                         th:if="${#fields.hasErrors('username')}"
                                         th:errors="*{username}"></div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <input class="form-control" id="email" th:field="*{email}"
                                               type="email" placeholder="correo@ejemplo.com" required />
                                        <label for="email">Correo Electrónico</label>
                                    </div>
                                    <div class="text-danger small mt-1"
                                         th:if="${#fields.hasErrors('email')}"
                                         th:errors="*{email}"></div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <input class="form-control" id="password" th:field="*{password}"
                                               type="password" placeholder="Contraseña" required />
                                        <label for="password">Contraseña</label>
                                    </div>
                                    <div class="text-danger small mt-1"
                                         th:if="${#fields.hasErrors('password')}"
                                         th:errors="*{password}"></div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <input class="form-control" id="confirmPassword"
                                               name="confirmPassword" type="password"
                                               placeholder="Confirmar Contraseña" required />
                                        <label for="confirmPassword">Confirmar Contraseña</label>
                                    </div>
                                </div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary py-2 fw-semibold">
                                    <i class="bi bi-person-check me-2"></i>Crear Cuenta
                                </button>
                            </div>
                        </form>
                    </div>

                    <div class="card-footer text-center py-3 bg-light border-top-0">
                        <span class="small text-muted">¿Ya tienes cuenta? </span>
                        <a th:href="@{/login}" class="small fw-semibold text-decoration-none">Iniciar sesión</a>
                    </div>
                </div>
            </div>
        </div>

        <script>
            document.getElementById('nombreCompleto').addEventListener('input', function() {
                const pos = this.selectionStart;
                this.value = this.value.toLowerCase();
                this.setSelectionRange(pos, pos);
            });
            const docInput = document.getElementById('numeroIdentificacion');
            docInput.addEventListener('keypress', function(e) {
                if (!/[0-9]/.test(e.key)) e.preventDefault();
            });
            docInput.addEventListener('paste', function(e) {
                e.preventDefault();
                const texto = (e.clipboardData || window.clipboardData).getData('text');
                document.execCommand('insertText', false, texto.replace(/[^0-9]/g, ''));
            });
        </script>
    </section>
</body>
</html>
